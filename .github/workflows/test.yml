name: test

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux / GCC 14 ──
          - os: ubuntu-24.04
            compiler: gcc-14
            preset: dev-gcc

          # ── Linux / Clang 18 ──
          - os: ubuntu-24.04
            compiler: clang-18+libc++
            preset: dev-clang-libcxx

          # ── macOS 15 / AppleClang 16 ──
          - os: macos-15
            compiler: apple-clang-16
            preset: dev-clang

          # ── Windows 2022 / MSVC (Ninja Multi-Config) ──
          - os: windows-2022
            compiler: msvc
            preset: dev-msvc

    steps:
      - uses: actions/checkout@v5

      - name: Set up MSVC environment
        if: matrix.compiler == 'msvc'
        shell: pwsh
        run: |
          $vcvars = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmd /c "`"$vcvars`" && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              "$($Matches[1])=$($Matches[2])" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          }

      - name: Install libc++
        if: matrix.compiler == 'clang-18+libc++'
        run: sudo apt-get install -y libc++-18-dev libc++abi-18-dev

      - name: Install Ninja
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}-debug

      - name: Test
        run: ctest --preset ${{ matrix.preset }}-debug
